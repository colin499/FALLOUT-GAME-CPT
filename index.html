<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RobCo Industries Unified Operating System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --green: #39FF14;
    --dim-green: #1a7a09;
    --dark-green: #0d3d07;
    --bg: #000000;
    --glow: 0 0 8px #39FF14, 0 0 16px #39FF1466;
    --glow-dim: 0 0 4px #39FF1488;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 16px;
    overflow: hidden;
    cursor: none;
  }

  /* CRT screen wrapper */
  #screen {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 28px 36px;
    overflow: hidden;
  }

  /* Scanlines overlay */
  #screen::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.2) 3px,
      rgba(0,0,0,0.2) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Vignette */
  #screen::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.9) 100%);
    pointer-events: none;
    z-index: 99;
  }

  @keyframes flicker {
    0%   { opacity: 1; }
    92%  { opacity: 1; }
    93%  { opacity: 0.82; }
    94%  { opacity: 1; }
    96%  { opacity: 0.9; }
    100% { opacity: 1; }
  }
  #screen { animation: flicker 6s infinite; }

  @keyframes scanline-move {
    from { top: -10%; }
    to   { top: 110%; }
  }
  .scanline-sweep {
    position: fixed;
    left: 0; width: 100%;
    height: 3px;
    background: rgba(57, 255, 20, 0.07);
    pointer-events: none;
    z-index: 101;
    animation: scanline-move 8s linear infinite;
  }

  /* ---- BOOT ---- */
  #boot {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 50;
    padding: 40px;
  }

  .robco-logo {
    text-align: center;
    line-height: 1.1;
    text-shadow: var(--glow);
    margin-bottom: 32px;
    white-space: pre;
    font-size: clamp(8px, 1.2vw, 14px);
    color: var(--green);
  }

  .boot-text {
    text-align: center;
    text-shadow: var(--glow-dim);
    margin-bottom: 8px;
    opacity: 0;
  }
  .boot-text.visible { opacity: 1; }

  .progress-bar-wrap {
    width: 400px;
    max-width: 80vw;
    border: 1px solid var(--green);
    height: 18px;
    margin: 16px auto;
    box-shadow: var(--glow-dim);
    opacity: 0;
  }
  .progress-bar-wrap.visible { opacity: 1; }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.05s linear;
    box-shadow: var(--glow);
  }

  /* ---- TERMINAL SHARED ---- */
  #terminal {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .header-block {
    border-bottom: 1px solid var(--dim-green);
    padding-bottom: 12px;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: clamp(14px, 2vw, 20px);
    text-shadow: var(--glow);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .header-sub {
    color: var(--dim-green);
    font-size: 12px;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .footer-bar {
    border-top: 1px solid var(--dark-green);
    margin-top: 16px;
    padding-top: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim-green);
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .footer-bar .key-hint span {
    color: var(--green);
    text-shadow: var(--glow-dim);
  }

  /* ---- VIEW TRANSITIONS ---- */
  .view {
    flex: 1;
    display: none;
    flex-direction: column;
    min-height: 0;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .view.active {
    display: flex;
    opacity: 1;
  }
  @keyframes view-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .view.animating { animation: view-in 0.15s ease forwards; }

  /* ---- MENU VIEW ---- */
  #view-menu {
    flex-direction: row !important;
    gap: 0;
  }

  .menu-side {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }

  .vault-boy-side {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-left: 32px;
    padding-right: 8px;
    perspective: 800px;
  }

  @keyframes vault-boy-revolve {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
  }

  .vault-boy-img {
    width: clamp(160px, 18vw, 280px);
    filter:
      invert(1)
      sepia(1)
      saturate(6)
      hue-rotate(65deg)
      brightness(0.95)
      drop-shadow(0 0 12px #39FF14)
      drop-shadow(0 0 4px #39FF14);
    user-select: none;
    transform-origin: center center;
  }

  .menu-label {
    color: var(--dim-green);
    font-size: 11px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .menu-items {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--dim-green) transparent;
  }

  .menu-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: clamp(13px, 1.5vw, 16px);
    letter-spacing: 2px;
    border: 1px solid transparent;
    margin-bottom: 4px;
    text-shadow: var(--glow-dim);
    user-select: none;
    text-transform: uppercase;
  }

  .menu-item::before {
    content: '   ';
    white-space: pre;
  }

  .menu-item.selected {
    color: var(--bg);
    background: var(--green);
    border-color: var(--green);
    text-shadow: none;
    box-shadow: var(--glow);
  }

  .menu-item.selected::before {
    content: '>  ';
  }

  .menu-item:hover:not(.selected) {
    color: var(--bg);
    background: var(--dim-green);
    border-color: var(--dim-green);
    text-shadow: none;
  }

  /* ---- CONTENT VIEW ---- */
  .content-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dim-green) transparent;
    padding-right: 8px;
  }

  .content-scroll::-webkit-scrollbar { width: 4px; }
  .content-scroll::-webkit-scrollbar-thumb { background: var(--dim-green); }

  .content-body {
    line-height: 1.8;
    font-size: clamp(13px, 1.4vw, 15px);
    text-shadow: var(--glow-dim);
    white-space: pre-wrap;
  }

  .content-body .section-title {
    font-size: clamp(14px, 1.6vw, 18px);
    text-shadow: var(--glow);
    letter-spacing: 3px;
    border-bottom: 1px solid var(--dim-green);
    padding-bottom: 8px;
    margin-bottom: 18px;
    display: block;
    text-transform: uppercase;
  }

  .content-body .dim    { color: var(--dim-green); }
  .content-body .warning {
    color: #FF6B35;
    text-shadow: 0 0 8px #FF6B3588;
  }

  /* Cursor blink */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  .cursor {
    display: inline-block;
    width: 10px;
    height: 1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    box-shadow: var(--glow);
  }

  /* back hint in content footer */
  .back-item {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 16px;
    border: 1px solid var(--dim-green);
    color: var(--dim-green);
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 2px;
    user-select: none;
  }
  .back-item:hover, .back-item.selected {
    color: var(--bg);
    background: var(--green);
    border-color: var(--green);
    text-shadow: none;
    box-shadow: var(--glow);
  }

</style>
</head>

<span class="dim">в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</span>

const ROBCO_ASCII = `
в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—
в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘
в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘
в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ

    I N D U S T R I E S   (TM)
`.trim();

// ---- STATE ----
let selectedIndex = 0;
let currentView = 'menu'; // 'menu' | 'content'

// ---- AUDIO ----
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;

  const bufSize = ctx.sampleRate * 0.04;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.2;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.28, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  noise.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  noise.start(t); noise.stop(t + 0.04);

  const osc = ctx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(900, t);
  osc.frequency.exponentialRampToValueAtTime(400, t + 0.03);
  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.08, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  osc.connect(oscGain); oscGain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.03);
}

function playSelect() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;

  [700, 1050].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + i * 0.04);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0, t + i * 0.04);
    gain.gain.linearRampToValueAtTime(0.12, t + i * 0.04 + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.07);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t + i * 0.04); osc.stop(t + i * 0.04 + 0.07);
  });

  const bufSize = ctx.sampleRate * 0.05;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.8;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  noise.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  noise.start(t); noise.stop(t + 0.05);
}

function playBootStatic() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const bufSize = ctx.sampleRate * 0.35;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 600;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.0, t);
  gain.gain.linearRampToValueAtTime(0.15, t + 0.05);
  gain.gain.setValueAtTime(0.15, t + 0.25);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  noise.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
  noise.start(t); noise.stop(t + 0.35);
}

// ---- BOOT ----
async function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function bootSequence() {
  document.getElementById('logo').textContent = ROBCO_ASCII;
  await sleep(600);

  const bt1 = document.getElementById('bt1');
  const bt2 = document.getElementById('bt2');
  const bt3 = document.getElementById('bt3');
  const bt4 = document.getElementById('bt4');
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');

  playBootStatic();
  bt1.classList.add('visible');
  await sleep(500);
  bt2.classList.add('visible');
  await sleep(600);
  bt3.classList.add('visible');
  await sleep(400);
  progressWrap.classList.add('visible');

  const steps = [
    [15,  200, 'READING HOLOTAPE...'],
    [35,  300, 'VERIFYING CHECKSUM...'],
    [55,  250, 'LOADING PROGRAM DATA...'],
    [75,  350, 'INITIALIZING TERMLINK...'],
    [90,  200, 'DECRYPTING CONTENTS...'],
    [100, 150, 'ACCESS GRANTED'],
  ];

  for (const [pct, delay, msg] of steps) {
    progressFill.style.width = pct + '%';
    bt4.textContent = msg;
    bt4.classList.add('visible');
    playTick();
    await sleep(delay);
  }

  await sleep(500);
  document.getElementById('boot').style.transition = 'opacity 0.4s';
  document.getElementById('boot').style.opacity = '0';
  await sleep(400);
  document.getElementById('boot').style.display = 'none';
  launchTerminal();
}

// ---- TERMINAL ----
function launchTerminal() {
  document.getElementById('terminal').style.display = 'flex';
  buildMenu();
  showView('menu');
}

function buildMenu() {
  const menuList = document.getElementById('menu-list');
  menuList.innerHTML = '';
  MENU_ITEMS.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = 'menu-item' + (i === selectedIndex ? ' selected' : '');
    li.textContent = item.label;
    li.addEventListener('click', () => {
      highlightMenuItem(i);
      openContent(i);
    });
    menuList.appendChild(li);
  });
}

function highlightMenuItem(index) {
  document.querySelectorAll('.menu-item').forEach((el, i) => {
    el.classList.toggle('selected', i === index);
  });
  selectedIndex = index;
}

function showView(name) {
  const views = document.querySelectorAll('.view');
  views.forEach(v => { v.classList.remove('active', 'animating'); });

  currentView = name;
  const target = document.getElementById('view-' + name);
  target.classList.add('active', 'animating');

  // update footer hints
  const footerKeys = document.getElementById('footer-keys');
  if (name === 'menu') {
    footerKeys.innerHTML = '<span>[W/S]</span> or <span>[вҶ‘/вҶ“]</span> NAVIGATE &nbsp;&nbsp; <span>[ENTER]</span> SELECT';
    document.getElementById('header-title').textContent = 'PAU HOLOTAPE v1.0';
  } else {
    footerKeys.innerHTML = '<span>[ESC]</span> or <span>[BACKSPACE]</span> BACK';
  }
}

function openContent(index) {
  playSelect();
  const item = MENU_ITEMS[index];
  document.getElementById('header-title').textContent = item.label;
  document.getElementById('content-body').innerHTML = item.content + '<span class="cursor"></span>';
  document.getElementById('view-content').scrollTop = 0;
  showView('content');
}

function goBack() {
  playSelect();
  showView('menu');
  // restore scroll position to selected item
  const items = document.querySelectorAll('.menu-item');
  if (items[selectedIndex]) items[selectedIndex].scrollIntoView({ block: 'nearest' });
}

document.getElementById('back-btn').addEventListener('click', goBack);

// ---- KEYBOARD ----
document.addEventListener('keydown', (e) => {
  if (document.getElementById('terminal').style.display === 'none' ||
      !document.getElementById('terminal').style.display) return;

  if (currentView === 'menu') {
    const count = MENU_ITEMS.length;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      e.preventDefault();
      highlightMenuItem((selectedIndex - 1 + count) % count);
      document.querySelectorAll('.menu-item')[selectedIndex].scrollIntoView({ block: 'nearest' });
      playTick();
    } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
      e.preventDefault();
      highlightMenuItem((selectedIndex + 1) % count);
      document.querySelectorAll('.menu-item')[selectedIndex].scrollIntoView({ block: 'nearest' });
      playTick();
    } else if (e.key === 'Enter') {
      openContent(selectedIndex);
    }
  } else if (currentView === 'content') {
    if (e.key === 'Escape' || e.key === 'Backspace') {
      e.preventDefault();
      goBack();
    }
  }
});

window.addEventListener('load', bootSequence);
</script>
